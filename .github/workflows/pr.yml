name: PR Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tofu:
    name: OpenTofu (fmt / init / validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.0
          tofu_wrapper: false

      - name: tofu fmt -check -recursive
        run: tofu fmt -check -recursive

      - name: tofu init (no backend)
        run: tofu init -backend=false

      - name: tofu validate
        run: tofu validate

  backend:
    name: Backend (node --check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check .mjs files
        run: |
          shopt -s nullglob
          files=(*.mjs)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .mjs files found in backend/"
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "node --check $f"
            node --check "$f"
          done
        shell: bash
